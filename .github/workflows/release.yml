name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
          - os: ubuntu-22.04-arm
            name: linux-aarch64
          - os: macos-15
            name: macos-arm64
    runs-on: ${{ matrix.os }}

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0 # needed for git describe version string

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libncursesw5-dev zlib1g-dev pkg-config

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}
          cp build/molterm build/USalign THIRDPARTY.md molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}/
          tar czf molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}.tar.gz \
            molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}/

      - uses: actions/upload-artifact@v4
        with:
          name: molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}
          path: molterm-${{ env.RELEASE_TAG }}-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: "*.tar.gz"
